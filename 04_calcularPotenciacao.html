<script>
    /*
    PROBLEMA
    Faça um script que receba um número e apresente o resultado do número elevado ao quadrado e elevado ao cubo
    */

    //ENTRADA
    const numero = Number(prompt("digite um numero"))

    //PROCESSAMENTO

    const elevquadrado = numero * numero
    const elevcubo = numero * numero * numero

    //SAÍDA
    document.write(`O numero elevado ao quadrado é ${elevquadrado} e o numero elevado ao cubo é ${elevcubo}`)

</script>
