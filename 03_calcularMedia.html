<script>
    /*
    PROBLEMA
    Faça um script que receba três valores e apresente a média aritmética resultante dos valores informados
    */

    //ENTRADA
      const nota1 = parseInt(prompt("digite uma nota"))
      const nota2 = parseInt(prompt("digite outra nota"))
      const nota3 = parseInt(prompt("digite mais uma nota"))

    //PROCESSAMENTO

    const media = (nota1 + nota2 + nota3) / 3

    //SAÍDA

    document.write(`Sua media final foi de ${media.toFixed(1)} `)

</script>
