<script>
    /*
    PROBLEMA
    Faça um script que receba as dimensões de um retângulo (base e altura), calcule e apresente a área total do retângulo. 
    */

    //ENTRADA
    const base = Number(prompt("digite a base do retangulo")) 
    const altura = Number(prompt("digite a altura do retangulo"))

    //PROCESSAMENTO
    const area = base * altura

    //SAÍDA
    document.write(`A area foi de ${area} metros quadrados`)

</script>
