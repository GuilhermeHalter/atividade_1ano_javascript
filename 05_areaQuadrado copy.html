<script>
    /*
    PROBLEMA
    Faça um script que receba uma medida do quadrado, 
    calcule e apresente a área total do quadrado.
    */

     //ENTRADA
     const lado = Number(prompt("digite o tamanho")) 

    //PROCESSAMENTO

    const area = lado * lado 

    //SAÍDA

    document.write(`A area total do quadrado é ${area}`)
    

</script>
