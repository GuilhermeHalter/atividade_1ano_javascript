<script>
    /*
    PROBLEMA
    Faça um script que peça dois números e retorne:
    - o inteiro resultante da divisão entre os dois números
    - o resto resultante da divisão entre os dos números
    */

   //ENTRADA
    const n1 = Number(prompt("digite um número"))
    const n2 = Number(prompt("digite outro número"))
    //PROCESSAMENTO

    const divi = n1 / n2
    const restdivi = n1 % n2

    //SAÍDA
    
    document.write(`A divisão dos números é ${divi.toFixed(2)}, e o resto da divisão é ${restdivi} `)

</script>
